<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar MOD Widgets</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; color: #e5edf8; font-family: Inter, Arial, sans-serif; overflow: hidden; }
    body { padding: 4px; }
    main { height: 40px; display: flex; align-items: center; gap: 4px; padding: 3px 4px; border: 1px solid #263a55; border-radius: 9px; background: rgba(7, 17, 31, .94); box-shadow: 0 8px 24px rgba(0,0,0,.35); -webkit-app-region: drag; }
    .grip { width: 13px; flex: 0 0 13px; color: #64748b; font-size: 15px; text-align: center; cursor: move; }
    button { width: 34px; height: 32px; flex: 0 0 34px; display: grid; place-items: center; padding: 0; border: 1px solid transparent; background: transparent; color: #dbeafe; border-radius: 6px; cursor: pointer; -webkit-app-region: no-drag; }
    button:hover { border-color: #334b69; background: #10223a; }
    button i { font-size: 19px; color: #22d3ee; }
    button span { display: none; }
    main button.active { border-color: #14b8a6; background: #0b2d32; box-shadow: inset 0 0 0 1px rgba(20,184,166,.2); }
    main button.odds i { color: #facc15; }
    #close-all { margin-left: auto; }
    #close-all i { color: #94a3b8; font-size: 20px; }
  </style>
</head>
<body>
  <main>
    <div class="grip" title="Mover barra"><i class="bx bx-grid-vertical"></i></div>
    <button data-widget="events" title="Eventos" aria-label="Eventos"><i class="bx bx-list-ul"></i><span>Eventos</span></button>
    <button data-widget="stats" title="Placar e estatisticas" aria-label="Placar e estatisticas"><i class="bx bx-football"></i><span>Placar + stats</span></button>
    <button data-widget="sofascore" title="Pressao SofaScore" aria-label="Pressao SofaScore"><i class="bx bx-bar-chart-alt-2"></i><span>SofaScore</span></button>
    <button data-widget="radar-pressure" title="Pressao Radar MOD" aria-label="Pressao Radar MOD"><i class="bx bx-bar-chart-square"></i><span>Pressao MOD</span></button>
    <button data-widget="intelligence" title="Inteligencia ao vivo" aria-label="Inteligencia ao vivo"><i class="bx bx-brain"></i><span>Inteligencia</span></button>
    <button data-widget="heatmap" title="Mapa de calor" aria-label="Mapa de calor"><i class="bx bxs-flame"></i><span>Calor</span></button>
    <button class="odds" id="bet365" title="Mercados Bet365" aria-label="Mercados Bet365"><i class="bx bx-dollar-circle"></i><span>Bet365</span></button>
    <button id="group-menu" title="Gerenciar conjunto" aria-label="Gerenciar conjunto"><i class="bx bx-dots-horizontal-rounded"></i></button>
    <button id="close-all" title="Fechar barra e widgets" aria-label="Fechar barra e widgets"><i class="bx bx-x"></i></button>
  </main>
  <script src="./radar-widget-manager.js"></script>
</body>
</html>
