<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrir widgets</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; color: #eaf2ff; font-family: Inter, Arial, sans-serif; }
    body { padding: 8px; }
    main { width: 100%; height: 100%; padding: 14px; border: 1px solid #2b4261; border-radius: 8px; background: rgba(7, 17, 31, .98); box-shadow: 0 18px 50px rgba(0, 0, 0, .48); }
    header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 7px; color: #22d3ee; background: #0c2a3c; }
    .icon i { font-size: 20px; }
    h1 { margin: 0; font-size: 15px; line-height: 1.2; }
    p { margin: 3px 0 0; color: #8fa2bb; font-size: 11px; }
    #close { margin-left: auto; width: 30px; height: 30px; display: grid; place-items: center; border: 0; border-radius: 6px; color: #94a3b8; background: transparent; cursor: pointer; }
    #close:hover { color: #fff; background: #15263c; }
    #close i { font-size: 20px; }
    .positions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }
    .position { min-width: 0; height: 55px; display: grid; grid-template-columns: 34px 1fr; align-items: center; gap: 9px; padding: 7px 9px; border: 1px solid #263b57; border-radius: 7px; color: #eaf2ff; background: #0b192b; cursor: pointer; text-align: left; }
    .position:hover, .position:focus-visible { outline: none; border-color: #14b8a6; background: #0c2932; }
    .position-number { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 6px; color: #67e8f9; background: #102a3d; font-size: 14px; font-weight: 800; }
    .position strong, .position small { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .position strong { font-size: 12px; }
    .position small { margin-top: 3px; color: #8295ae; font-size: 10px; }
    .position.free .position-number { color: #facc15; background: #30270c; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="icon"><i class="bx bx-windows"></i></div>
      <div><h1>Onde deseja abrir?</h1><p>Restaure a central e os widgets deste jogo.</p></div>
      <button id="close" type="button" aria-label="Cancelar" title="Cancelar"><i class="bx bx-x"></i></button>
    </header>
    <section class="positions" id="positions"></section>
  </main>
  <script src="./radar-widget-position.js"></script>
</body>
</html>
