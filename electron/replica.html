<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destaque</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    #frame {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      background: transparent;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <img id="frame" alt="">
  <script>
    const frame = document.getElementById('frame');
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { willReadFrequently: true });

    window.replicaBridge.onFrame((payload) => {
      const dataUrl = typeof payload === 'string' ? payload : payload?.dataUrl;
      if (!dataUrl) return;
      if (!payload?.chromaKey) {
        frame.src = dataUrl;
        return;
      }
      applyDarkChromaKey(dataUrl);
    });

    function applyDarkChromaKey(dataUrl) {
      const image = new Image();
      image.onload = () => {
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0);
        const frameData = context.getImageData(0, 0, canvas.width, canvas.height);
        const data = frameData.data;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const a = data[i + 3];
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);

          if (a && max <= 118 && (max - min) <= 42) {
            data[i + 3] = 0;
          } else if (a && max <= 155 && (max - min) <= 50) {
            data[i + 3] = Math.round(a * Math.max(0, (max - 118) / 37));
          }
        }

        context.putImageData(frameData, 0, 0);
        frame.src = canvas.toDataURL('image/png');
      };
      image.src = dataUrl;
    }

    window.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      window.replicaBridge.showMenu();
    });

    window.addEventListener('wheel', (event) => {
      event.preventDefault();
      window.replicaBridge.zoom(event.deltaY < 0 ? 1 : -1);
    }, { passive: false });

    window.addEventListener('keydown', (event) => {
      if (event.key === '+' || event.key === '=') window.replicaBridge.zoom(1);
      if (event.key === '-' || event.key === '_') window.replicaBridge.zoom(-1);
      if (event.key.toLowerCase() === 'm') window.replicaBridge.showMenu();
    });

    let dragging = false;

    window.addEventListener('mousedown', (event) => {
      if (event.button !== 0) return;
      dragging = true;
      window.replicaBridge.beginDrag(event.screenX, event.screenY);
    });

    window.addEventListener('mousemove', (event) => {
      if (!dragging) return;
      window.replicaBridge.dragTo(event.screenX, event.screenY);
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      window.replicaBridge.endDrag();
    });

    window.addEventListener('mouseleave', () => {
      if (!dragging) return;
      dragging = false;
      window.replicaBridge.endDrag();
    });
  </script>
</body>
</html>
